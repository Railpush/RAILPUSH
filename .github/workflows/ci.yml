name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        shell: bash
        run: |
          set -euo pipefail
          cd dashboard
          npm ci
          npm run build

  api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build and test API
        shell: bash
        run: |
          set -euo pipefail
          cd api
          go mod download
          go test ./...
          go build ./...
