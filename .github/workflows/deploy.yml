name: Deploy To Server

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST}" || { echo "Missing DEPLOY_HOST secret"; exit 1; }
          test -n "${DEPLOY_USER}" || { echo "Missing DEPLOY_USER secret"; exit 1; }
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || { echo "Missing DEPLOY_SSH_KEY secret"; exit 1; }

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Sync, build and restart on server
        shell: bash
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS="-p ${PORT} -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=~/.ssh/cm-%C"
          RSYNC_SSH="ssh ${SSH_OPTS}"

          # Keep source sync and build in one step so the same SSH control session is reused.
          ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p /opt/railpush/railpush-api /opt/railpush/dashboard"

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            -e "${RSYNC_SSH}" \
            ./api/ "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/railpush/railpush-api/"

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            -e "${RSYNC_SSH}" \
            ./dashboard/ "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/railpush/dashboard/"

          ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" <<'SSH'
          set -euo pipefail

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          cd /opt/railpush/dashboard
          npm ci
          npm run build

          cd /opt/railpush/railpush-api
          PREV_BIN="/opt/railpush/railpush-api-bin.prev"
          NEW_BIN="/opt/railpush/railpush-api-bin.new"

          if [ -f /opt/railpush/railpush-api-bin ]; then
            cp -f /opt/railpush/railpush-api-bin "${PREV_BIN}"
          fi

          if [ -x /usr/local/go/bin/go ]; then
            /usr/local/go/bin/go mod download
            /usr/local/go/bin/go build -o "${NEW_BIN}" .
          elif command -v go >/dev/null 2>&1 && go version >/dev/null 2>&1; then
            go mod download
            go build -o "${NEW_BIN}" .
          elif command -v docker >/dev/null 2>&1; then
            echo "Go not found, using Docker to build..."
            docker run --rm \
              -v /opt/railpush/railpush-api:/src \
              -v /opt/railpush:/opt/railpush \
              -w /src golang:1.24-alpine \
              sh -c "export PATH=/usr/local/go/bin:\$PATH && go mod download && CGO_ENABLED=0 go build -o ${NEW_BIN} ."
          else
            echo "No Go compiler or Docker found on server."
            exit 1
          fi

          mv -f "${NEW_BIN}" /opt/railpush/railpush-api-bin

          SERVICE_UNIT=""
          for unit in railpush-api.service railpush-api railpush.service railpush-api-bin.service; do
            if ${SUDO} systemctl list-unit-files --type=service --all --no-legend --no-pager | awk '{print $1}' | grep -Fxq "${unit}"; then
              SERVICE_UNIT="${unit}"
              break
            fi
          done

          if [ -z "${SERVICE_UNIT}" ]; then
            ALL_UNITS="$(${SUDO} systemctl list-units --type=service --all --no-legend --no-pager | awk '{print $1}')"
            for unit in ${ALL_UNITS}; do
              [ -z "${unit}" ] && continue
              EXEC_START="$(${SUDO} systemctl show -p ExecStart --value "${unit}" 2>/dev/null || true)"
              if printf '%s' "${EXEC_START}" | grep -Fq "/opt/railpush/railpush-api-bin"; then
                SERVICE_UNIT="${unit}"
                break
              fi
            done
          fi

          if [ -z "${SERVICE_UNIT}" ]; then
            SERVICE_UNIT="railpush-api.service"
            RUN_USER="$(id -un)"
            RUN_GROUP="$(id -gn)"
            echo "No existing API systemd unit found. Bootstrapping ${SERVICE_UNIT} for ${RUN_USER}:${RUN_GROUP}."
            {
              printf '%s\n' '[Unit]'
              printf '%s\n' 'Description=RailPush API'
              printf '%s\n' 'After=network.target'
              printf '%s\n' 'Wants=network-online.target'
              printf '%s\n' ''
              printf '%s\n' '[Service]'
              printf '%s\n' 'Type=simple'
              printf '%s\n' 'WorkingDirectory=/opt/railpush/railpush-api'
              printf '%s\n' 'EnvironmentFile=-/opt/railpush/railpush-api/.env'
              printf '%s\n' 'EnvironmentFile=-/opt/railpush/.env'
              printf '%s\n' 'ExecStart=/opt/railpush/railpush-api-bin'
              printf '%s\n' 'Restart=always'
              printf '%s\n' 'RestartSec=5'
              printf '%s\n' "User=${RUN_USER}"
              printf '%s\n' "Group=${RUN_GROUP}"
              printf '%s\n' ''
              printf '%s\n' '[Install]'
              printf '%s\n' 'WantedBy=multi-user.target'
            } | ${SUDO} tee "/etc/systemd/system/${SERVICE_UNIT}" >/dev/null
            ${SUDO} systemctl daemon-reload
            ${SUDO} systemctl enable "${SERVICE_UNIT}" || true
          fi

          echo "Restarting ${SERVICE_UNIT}"
          ${SUDO} systemctl restart "${SERVICE_UNIT}"
          ${SUDO} systemctl is-active --quiet "${SERVICE_UNIT}"

          HEALTH_OK=0
          for i in $(seq 1 20); do
            CODE="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/healthz || true)"
            if [ "${CODE}" = "200" ]; then
              HEALTH_OK=1
              break
            fi
            sleep 2
          done

          if [ "${HEALTH_OK}" -ne 1 ]; then
            echo "Health check failed after deploy, rolling back API binary..."
            if [ -f "${PREV_BIN}" ]; then
              cp -f "${PREV_BIN}" /opt/railpush/railpush-api-bin
              ${SUDO} systemctl restart "${SERVICE_UNIT}"
            fi
            ${SUDO} systemctl --no-pager --lines=60 status "${SERVICE_UNIT}" || true
            exit 1
          fi

          ${SUDO} systemctl --no-pager --lines=20 status "${SERVICE_UNIT}"
          SSH

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          DEPLOY_SHA: ${{ env.DEPLOY_REF }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          [ -z "${SLACK_WEBHOOK_URL:-}" ] && exit 0
          SHORT_SHA="${DEPLOY_SHA:0:7}"
          if [ "${DEPLOY_STATUS}" = "success" ]; then
            EMOJI=":white_check_mark:"
          else
            EMOJI=":x:"
          fi
          TEXT="${EMOJI} Production deploy ${DEPLOY_STATUS} for ${GITHUB_REPOSITORY} (${DEPLOY_BRANCH}@${SHORT_SHA}). Run: ${RUN_URL}"
          SAFE_TEXT="$(printf '%s' "${TEXT}" | sed 's/\\/\\\\/g; s/\"/\\"/g')"
          curl -fsS -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"${SAFE_TEXT}\"}"

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          DEPLOY_SHA: ${{ env.DEPLOY_REF }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          [ -z "${DISCORD_WEBHOOK_URL:-}" ] && exit 0
          SHORT_SHA="${DEPLOY_SHA:0:7}"
          if [ "${DEPLOY_STATUS}" = "success" ]; then
            TAG="[OK]"
          else
            TAG="[FAIL]"
          fi
          TEXT="${TAG} Production deploy ${DEPLOY_STATUS} for ${GITHUB_REPOSITORY} (${DEPLOY_BRANCH}@${SHORT_SHA}). Run: ${RUN_URL}"
          SAFE_TEXT="$(printf '%s' "${TEXT}" | sed 's/\\/\\\\/g; s/\"/\\"/g')"
          curl -fsS -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data "{\"content\":\"${SAFE_TEXT}\"}"
