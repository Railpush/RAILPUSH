<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary Meta Tags -->
    <title>RailPush — Deploy Your Apps Effortlessly</title>
    <meta name="description" content="RailPush is a git-native platform for shipping services, workers, cron, and Postgres from one console. Instant rollouts, TLS, domains, and rollbacks without extra wiring." />
    <meta name="keywords" content="PaaS, cloud hosting, deploy apps, postgres hosting, redis hosting, docker deployment, heroku alternative, git deploy, auto scaling, railpush" />
    <meta name="author" content="RailPush" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://railpush.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://railpush.com/" />
    <meta property="og:title" content="RailPush — Deploy Your Apps Effortlessly" />
    <meta property="og:description" content="The cloud platform for developers. Deploy from Git in seconds. Managed databases, custom domains, auto-scaling. Free tier available." />
    <meta property="og:site_name" content="RailPush" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RailPush — Deploy Your Apps Effortlessly" />
    <meta name="twitter:description" content="The cloud platform for developers. Deploy from Git in seconds. Managed databases, custom domains, auto-scaling." />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="color-scheme" content="dark" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://rsms.me/" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://railpush.com/#organization",
          "name": "RailPush",
          "url": "https://railpush.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://railpush.com/favicon.svg"
          },
          "description": "Cloud platform for deploying web applications with automatic scaling and zero-config deployments"
        },
        {
          "@type": "WebSite",
          "@id": "https://railpush.com/#website",
          "url": "https://railpush.com",
          "name": "RailPush",
          "publisher": { "@id": "https://railpush.com/#organization" }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://railpush.com/#app",
          "name": "RailPush",
          "applicationCategory": "DeveloperApplication",
          "operatingSystem": "Web",
          "url": "https://railpush.com",
          "description": "Deploy web apps, APIs, databases, and cron jobs in seconds. Zero-config deployments from Git with managed PostgreSQL and Redis.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Free tier available"
          },
          "featureList": [
            "Zero-config Git deployments",
            "Managed PostgreSQL databases",
            "Managed Redis instances",
            "Custom domains with auto-TLS",
            "Docker support",
            "Cron job scheduling",
            "Background workers",
            "Auto-scaling",
            "Infrastructure as Code (Blueprints)"
          ],
          "provider": { "@id": "https://railpush.com/#organization" }
        }
      ]
    }
    </script>

    <style>
      html { background: #0A0A0F; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
