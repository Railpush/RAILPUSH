apiVersion: apps/v1
kind: Deployment
metadata:
  name: railpush-worker
  namespace: railpush
spec:
  replicas: 1
  selector:
    matchLabels:
      app: railpush-worker
  template:
    metadata:
      labels:
        app: railpush-worker
    spec:
      serviceAccountName: railpush-control-plane
      # Worker can be running long deploy/build tasks; keep a long enough shutdown window
      # to release leases cleanly and avoid mid-build SIGKILL.
      terminationGracePeriodSeconds: 1800
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: worker
          image: 91.98.183.19:5000/railpush/control-plane:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            # Worker pods execute deploys/builds by polling the durable DB queue.
            - name: WORKER_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: railpush-config
            - secretRef:
                name: railpush-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/railpush
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: data
          emptyDir: {}
