apiVersion: v1
kind: ServiceAccount
metadata:
  name: railpush-tenant-backup
  namespace: railpush
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: railpush-tenant-backup
  namespace: railpush
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: railpush-tenant-backup
  namespace: railpush
subjects:
  - kind: ServiceAccount
    name: railpush-tenant-backup
    namespace: railpush
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: railpush-tenant-backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: railpush-tenant-backups
  namespace: railpush
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-r3
  resources:
    requests:
      storage: 100Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: railpush-tenant-backup
  namespace: railpush
spec:
  schedule: "20 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 7200
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: railpush-tenant-backup
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
          containers:
            - name: backup
              image: 91.98.183.19:5000/railpush/tenant-backup:dev
              imagePullPolicy: Always
              env:
                - name: NAMESPACE
                  value: railpush
                - name: BACKUP_DIR
                  value: /backups
                - name: RETENTION_DAYS
                  value: "7"
                - name: ZSTD_LEVEL
                  value: "6"
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: railpush-tenant-backups
