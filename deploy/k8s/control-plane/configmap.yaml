apiVersion: v1
kind: ConfigMap
metadata:
  name: railpush-config
  namespace: railpush
data:
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"

  # Staging console host (Phase 3).
  CONTROL_PLANE_DOMAIN: "apps.railpush.com"
  # Default service hostnames (wildcard).
  DEPLOY_DOMAIN: "apps.railpush.com"
  # Disable legacy Caddy-based routing in Kubernetes (we use ingress-nginx instead).
  DEPLOY_DISABLE_ROUTER: "true"
  # DNS-only hostname for external database connections (bypasses Cloudflare proxy).
  DB_EXTERNAL_HOST: "db.railpush.com"

  # Enable Kubernetes runtime for customer services.
  KUBE_ENABLED: "true"
  KUBE_NAMESPACE: "railpush"
  KUBE_INGRESS_CLASS: "nginx"
  KUBE_TLS_SECRET: "apps-wildcard-tls"
  KUBE_STORAGE_CLASS: "longhorn-r2"
  # Custom domains need HTTP-01 (customer zones are not in our Cloudflare account).
  KUBE_CUSTOM_DOMAIN_ISSUER: "letsencrypt-http01-prod"
  # strict: runAsNonRoot + drop ALL caps + readOnlyRootFilesystem (+ writable /tmp)
  # compat: seccomp + drop dangerous caps + no K8s API access (writable rootfs, app default UID)
  KUBE_TENANT_POD_SECURITY_PROFILE: "compat"

  DB_HOST: "railpush-postgres"
  DB_PORT: "5432"
  DB_NAME: "railpush"
  DB_USER: "railpush"
  DB_SSLMODE: "prefer"

  # Persist RailPush state (certs/backups/builds).
  DATA_DIR: "/var/lib/railpush"
  BACKUP_DIR: "/var/lib/railpush/backups"
  DOCKER_BUILD_PATH: "/var/lib/railpush/builds"
  # Internal registry prefix used for Kubernetes git builds (Kaniko pushes here).
  # Example image: 91.98.183.19:5000/railpush/svc-<service-id>:<deploy-id>
  DOCKER_REGISTRY: "91.98.183.19:5000/railpush"

  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  # Loki query base URL (deploy/build log hydration).
  LOKI_URL: "http://loki-gateway.logging.svc.cluster.local"

  # Add more origins as you introduce additional console hostnames.
  CORS_ALLOWED_ORIGINS: "https://apps.railpush.com,https://railpush.com,https://www.railpush.com,https://flightatom-client-tasks.apps.railpush.com"

  # Stripe (prices are not secret; keys live in the `railpush-secrets` Secret).
  # STRIPE_PRICE_STARTER: "price_..."
  # STRIPE_PRICE_STANDARD: "price_..."
  # STRIPE_PRICE_PRO: "price_..."

  # For staging, GitHub OAuth callback must match this host.
  GITHUB_CALLBACK_URL: "https://apps.railpush.com/api/v1/auth/github/callback"
