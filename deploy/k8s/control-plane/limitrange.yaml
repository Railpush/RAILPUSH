apiVersion: v1
kind: LimitRange
metadata:
  name: railpush-default-limits
  namespace: railpush
spec:
  limits:
    - type: Container
      min:
        cpu: 10m
        memory: 64Mi
      max:
        cpu: "8"
        memory: 16Gi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      default:
        cpu: "2"
        memory: 2Gi
