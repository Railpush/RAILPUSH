apiVersion: v1
kind: ServiceAccount
metadata:
  name: railpush-control-plane
  namespace: railpush
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: railpush-control-plane
  namespace: railpush
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: railpush-control-plane
  namespace: railpush
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: railpush-control-plane
subjects:
  - kind: ServiceAccount
    name: railpush-control-plane
    namespace: railpush
---
# Cross-namespace access to the ingress-nginx tcp-services ConfigMap.
# Required for external database access: the control plane manages TCP proxy
# entries that map external ports to in-cluster database services.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: railpush-tcp-services
  namespace: ingress-nginx
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["tcp-services"]
    verbs: ["get", "create", "update", "patch"]
  # create requires permissions without resourceNames (can't know the name before creation).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: railpush-tcp-services
  namespace: ingress-nginx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: railpush-tcp-services
subjects:
  - kind: ServiceAccount
    name: railpush-control-plane
    namespace: railpush
---
# Cluster-scoped read-only access required for deriving per-node podCIDR base IPs
# (flannel source IPs) used by hostNetwork ingress-nginx when proxying cross-node.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: railpush-control-plane-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: railpush-control-plane-nodes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: railpush-control-plane-nodes
subjects:
  - kind: ServiceAccount
    name: railpush-control-plane
    namespace: railpush
