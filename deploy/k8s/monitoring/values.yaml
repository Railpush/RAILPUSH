# kube-prometheus-stack values for RailPush (k3s, self-hosted).
#
# Install/upgrade (from cpu):
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f /opt/railpush/deploy/k8s/monitoring/values.yaml
#
# Grafana admin credentials are provided via an existing secret:
#   monitoring/monitoring-grafana-admin

# k3s does not expose these components as standard pods/services; disable to avoid noisy "down" alerts.
defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeProxy: false

kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

# node-exporter defaults to host networking; on our nodes, port 9100 is already in use on cpu/gpu.
# Run node-exporter on the pod network instead (Prometheus scrapes it via ServiceMonitor anyway).
prometheus-node-exporter:
  hostNetwork: false
  hostPID: false

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-r2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-r2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    # Mount Alertmanager->RailPush auth token.
    secrets:
      - alertmanager-webhook-token

  # Alert delivery:
  # - Always deliver to RailPush webhook receiver (in-cluster).
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - equal: ["namespace", "alertname"]
        source_matchers: ["severity = critical"]
        target_matchers: ["severity =~ warning|info"]
      - equal: ["namespace", "alertname"]
        source_matchers: ["severity = warning"]
        target_matchers: ["severity = info"]
      - equal: ["namespace"]
        source_matchers: ["alertname = InfoInhibitor"]
        target_matchers: ["severity = info"]
      - target_matchers: ["alertname = InfoInhibitor"]
    receivers:
      - name: "null"
      - name: "railpush-webhook"
        webhook_configs:
          - url: "http://railpush-control-plane.railpush.svc.cluster.local:8080/api/v1/webhooks/alertmanager"
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secrets/alertmanager-webhook-token/token
    route:
      group_by: ["namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "railpush-webhook"
      routes:
        - matchers: [alertname = "Watchdog"]
          receiver: "null"
    templates:
      - /etc/alertmanager/config/*.tmpl

grafana:
  admin:
    existingSecret: monitoring-grafana-admin

  # Grafana uses a single RWO PVC; rolling updates can deadlock on Multi-Attach.
  deploymentStrategy:
    type: Recreate

  # Provision Loki datasource (installed separately in the `logging` namespace).
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.logging.svc.cluster.local
      isDefault: false
      editable: false

  # Provision dashboards from git-managed values (dashboard-as-code).
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: railpush
          orgId: 1
          folder: RailPush
          type: file
          disableDeletion: false
          editable: false
          options:
            path: /var/lib/grafana/dashboards/railpush

  dashboards:
    railpush:
      railpush-overview:
        json: |
          {
            "annotations": {
              "list": []
            },
            "editable": false,
            "fiscalYearStartMonth": 0,
            "graphTooltip": 0,
            "panels": [
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "red"
                        },
                        {
                          "color": "green",
                          "value": 1
                        }
                      ]
                    }
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 6,
                  "w": 6,
                  "x": 0,
                  "y": 0
                },
                "id": 1,
                "options": {
                  "colorMode": "background",
                  "graphMode": "none",
                  "justifyMode": "auto",
                  "orientation": "auto",
                  "reduceOptions": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "fields": "",
                    "values": false
                  },
                  "textMode": "value"
                },
                "targets": [
                  {
                    "expr": "sum(kube_deployment_status_replicas_available{namespace=\"railpush\",deployment=\"railpush-control-plane\"})",
                    "refId": "A"
                  }
                ],
                "title": "Control Plane Ready Replicas",
                "type": "stat"
              },
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "red"
                        },
                        {
                          "color": "green",
                          "value": 1
                        }
                      ]
                    }
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 6,
                  "w": 6,
                  "x": 6,
                  "y": 0
                },
                "id": 2,
                "options": {
                  "colorMode": "background",
                  "graphMode": "none",
                  "justifyMode": "auto",
                  "orientation": "auto",
                  "reduceOptions": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "fields": "",
                    "values": false
                  },
                  "textMode": "value"
                },
                "targets": [
                  {
                    "expr": "sum(kube_deployment_status_replicas_available{namespace=\"railpush\",deployment=\"railpush-worker\"})",
                    "refId": "A"
                  }
                ],
                "title": "Worker Ready Replicas",
                "type": "stat"
              },
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green"
                        },
                        {
                          "color": "yellow",
                          "value": 1
                        },
                        {
                          "color": "red",
                          "value": 5
                        }
                      ]
                    }
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 6,
                  "w": 6,
                  "x": 12,
                  "y": 0
                },
                "id": 3,
                "options": {
                  "colorMode": "background",
                  "graphMode": "none",
                  "justifyMode": "auto",
                  "orientation": "auto",
                  "reduceOptions": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "fields": "",
                    "values": false
                  },
                  "textMode": "value"
                },
                "targets": [
                  {
                    "expr": "sum(increase(kube_job_status_failed{namespace=\"railpush\",job_name=~\"rp-build-.*\"}[15m]))",
                    "refId": "A"
                  }
                ],
                "title": "Build Failures (15m)",
                "type": "stat"
              },
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "unit": "percentunit"
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 6,
                  "w": 6,
                  "x": 18,
                  "y": 0
                },
                "id": 4,
                "options": {
                  "colorMode": "value",
                  "graphMode": "none",
                  "justifyMode": "auto",
                  "orientation": "auto",
                  "reduceOptions": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "fields": "",
                    "values": false
                  },
                  "textMode": "value"
                },
                "targets": [
                  {
                    "expr": "sum(rate(nginx_ingress_controller_requests{namespace=\"railpush\",ingress=~\"railpush-control-plane|railpush-control-plane-console\",status=~\"5..\"}[5m])) / clamp_min(sum(rate(nginx_ingress_controller_requests{namespace=\"railpush\",ingress=~\"railpush-control-plane|railpush-control-plane-console\"}[5m])), 1)",
                    "refId": "A"
                  }
                ],
                "title": "API 5xx Ratio (5m)",
                "type": "stat"
              },
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "palette-classic"
                    }
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 9,
                  "w": 12,
                  "x": 0,
                  "y": 6
                },
                "id": 5,
                "options": {
                  "legend": {
                    "calcs": [],
                    "displayMode": "list",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "single",
                    "sort": "none"
                  }
                },
                "targets": [
                  {
                    "expr": "sum(rate(nginx_ingress_controller_requests{namespace=\"railpush\",ingress=~\"railpush-control-plane|railpush-control-plane-console\",status!~\"5..\"}[5m]))",
                    "legendFormat": "2xx/3xx/4xx",
                    "refId": "A"
                  },
                  {
                    "expr": "sum(rate(nginx_ingress_controller_requests{namespace=\"railpush\",ingress=~\"railpush-control-plane|railpush-control-plane-console\",status=~\"5..\"}[5m]))",
                    "legendFormat": "5xx",
                    "refId": "B"
                  }
                ],
                "title": "API Request Rate",
                "type": "timeseries"
              },
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "palette-classic"
                    }
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 9,
                  "w": 12,
                  "x": 12,
                  "y": 6
                },
                "id": 6,
                "options": {
                  "legend": {
                    "calcs": [],
                    "displayMode": "list",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "single",
                    "sort": "none"
                  }
                },
                "targets": [
                  {
                    "expr": "sum(kube_pod_status_ready{namespace=\"railpush\",condition=\"true\",pod=~\"rp-svc-.*\"})",
                    "legendFormat": "Ready tenant pods",
                    "refId": "A"
                  },
                  {
                    "expr": "sum(kube_pod_status_ready{namespace=\"railpush\",condition=\"true\",pod=~\"railpush-postgres-cnpg-.*\"})",
                    "legendFormat": "Ready CNPG pods",
                    "refId": "B"
                  }
                ],
                "title": "Tenant + DB Pod Readiness",
                "type": "timeseries"
              }
            ],
            "refresh": "30s",
            "schemaVersion": 39,
            "style": "dark",
            "tags": [
              "railpush",
              "platform"
            ],
            "templating": {
              "list": []
            },
            "time": {
              "from": "now-6h",
              "to": "now"
            },
            "timepicker": {},
            "timezone": "browser",
            "title": "RailPush Platform Overview",
            "uid": "railpush-overview",
            "version": 1,
            "weekStart": ""
          }

  # Persist user-created dashboards, alert rules, etc.
  persistence:
    enabled: true
    type: pvc
    storageClassName: longhorn-r2
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # Issue a dedicated cert in the monitoring namespace (avoids cross-namespace TLS secrets).
      cert-manager.io/cluster-issuer: letsencrypt-http01-prod
    hosts:
      - grafana.apps.railpush.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.apps.railpush.com

# The Prometheus Operator self-scrape (ServiceMonitor) is optional. In some environments,
# its auto-generated serving cert SANs can be malformed and cause noisy TargetDown alerts.
# We rely on kube-state-metrics + deployment health alerts instead.
prometheusOperator:
  serviceMonitor:
    selfMonitor: false
