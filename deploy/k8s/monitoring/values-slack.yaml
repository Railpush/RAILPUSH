# Optional overlay values for external notifications (Slack).
#
# Usage (from cpu):
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f /opt/railpush/deploy/k8s/monitoring/values.yaml \
#     -f /opt/railpush/deploy/k8s/monitoring/values-slack.yaml
#
# Prereq:
# - Create `monitoring/alertmanager-slack-webhook` with key `url`.

alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-webhook-token
      - alertmanager-slack-webhook

  # Alert delivery:
  # - Always deliver to RailPush webhook receiver (in-cluster).
  # - Additionally deliver critical alerts to Slack (out-of-cluster paging).
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - equal: ["namespace", "alertname"]
        source_matchers: ["severity = critical"]
        target_matchers: ["severity =~ warning|info"]
      - equal: ["namespace", "alertname"]
        source_matchers: ["severity = warning"]
        target_matchers: ["severity = info"]
      - equal: ["namespace"]
        source_matchers: ["alertname = InfoInhibitor"]
        target_matchers: ["severity = info"]
      - target_matchers: ["alertname = InfoInhibitor"]
    receivers:
      - name: "null"
      - name: "railpush-webhook"
        webhook_configs:
          - url: "http://railpush-control-plane.railpush.svc.cluster.local:8080/api/v1/webhooks/alertmanager"
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secrets/alertmanager-webhook-token/token
      - name: "railpush-webhook+slack"
        webhook_configs:
          - url: "http://railpush-control-plane.railpush.svc.cluster.local:8080/api/v1/webhooks/alertmanager"
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secrets/alertmanager-webhook-token/token
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            send_resolved: true
            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: |-
              {{- range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{- end }}
    route:
      group_by: ["namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "railpush-webhook"
      routes:
        - matchers: [alertname = "Watchdog"]
          receiver: "null"
        - matchers: [severity = "critical"]
          receiver: "railpush-webhook+slack"
    templates:
      - /etc/alertmanager/config/*.tmpl

