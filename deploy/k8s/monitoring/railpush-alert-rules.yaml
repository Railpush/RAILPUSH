# Basic platform alert rules for RailPush (MVP).
#
# Apply (from cpu):
#   export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
#   kubectl apply -f /opt/railpush/deploy/k8s/monitoring/railpush-alert-rules.yaml

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: railpush-platform
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: railpush.platform
      rules:
        # Core control-plane health
        - alert: RailPushControlPlaneDown
          expr: kube_deployment_status_replicas_available{namespace="railpush",deployment="railpush-control-plane"} < 1
          for: 5m
          labels:
            severity: critical
            product: railpush
            component: control-plane
          annotations:
            summary: "RailPush control-plane has no available replicas"
            description: "The RailPush API/dashboard is unavailable in namespace railpush."

        - alert: RailPushWorkerDown
          expr: kube_deployment_status_replicas_available{namespace="railpush",deployment="railpush-worker"} < 1
          for: 5m
          labels:
            severity: critical
            product: railpush
            component: worker
          annotations:
            summary: "RailPush worker has no available replicas"
            description: "No deploy/build workers are running; deploys will not complete."

        - alert: RailPushPostgresDown
          # CNPG is the control-plane DB. Alert if no CNPG Postgres pods are Ready.
          expr: sum(kube_pod_status_ready{namespace="railpush",condition="true",pod=~"railpush-postgres-cnpg-.*"}) < 1
          for: 5m
          labels:
            severity: critical
            product: railpush
            component: postgres
          annotations:
            summary: "RailPush Postgres has no ready replicas"
            description: "RailPush control-plane DB appears down or not ready."

        # Ingress availability (if this is down, everything looks like 404/503 externally)
        - alert: IngressNginxControllerDown
          expr: kube_deployment_status_replicas_available{namespace="ingress-nginx",deployment="ingress-nginx-controller"} < 1
          for: 2m
          labels:
            severity: critical
            product: railpush
            component: ingress-nginx
          annotations:
            summary: "ingress-nginx controller has no available replicas"
            description: "External traffic to railpush.com and *.apps.railpush.com may fail."

        # Node pressure (kube-state-metrics)
        - alert: KubeNodeDiskPressure
          expr: max by (node) (kube_node_status_condition{condition="DiskPressure",status="true"}) == 1
          for: 5m
          labels:
            severity: warning
            product: railpush
            component: node
          annotations:
            summary: "Node is reporting DiskPressure"
            description: "Kubernetes is reporting DiskPressure on node {{ $labels.node }}."

        # Cert-manager / TLS (cert-manager metrics)
        - alert: CertManagerCertificateNotReady
          expr: max by (exported_namespace, name) (certmanager_certificate_ready_status{condition="True",exported_namespace=~"railpush|monitoring"}) == 0
          for: 10m
          labels:
            severity: warning
            product: railpush
            component: cert-manager
          annotations:
            summary: "Certificate is not Ready"
            description: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} is not Ready. TLS may fail or renewals may be stuck."

        - alert: CertManagerCertificateExpiringSoon
          expr: (certmanager_certificate_expiration_timestamp_seconds{exported_namespace=~"railpush|monitoring"} - time()) < 1209600
          for: 30m
          labels:
            severity: warning
            product: railpush
            component: cert-manager
          annotations:
            summary: "Certificate expiring within 14 days"
            description: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} expires soon. Ensure cert-manager can renew."

        # Loki PVC usage (avoid logging outage due to disk-full)
        - alert: LokiPersistentVolumeUsageHigh
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="logging",persistentvolumeclaim=~"storage-loki-.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="logging",persistentvolumeclaim=~"storage-loki-.*"}
            ) > 0.80
          for: 15m
          labels:
            severity: warning
            product: railpush
            component: loki
          annotations:
            summary: "Loki PVC usage is high (>80%)"
            description: "Loki storage PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is above 80% usage. Retention/compaction may be failing or log volume has spiked."

        - alert: LokiPersistentVolumeUsageCritical
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="logging",persistentvolumeclaim=~"storage-loki-.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="logging",persistentvolumeclaim=~"storage-loki-.*"}
            ) > 0.90
          for: 5m
          labels:
            severity: critical
            product: railpush
            component: loki
          annotations:
            summary: "Loki PVC usage is critical (>90%)"
            description: "Loki storage PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is above 90% usage. Logging may stop soon; increase disk or reduce retention immediately."

        # API 5xx (via ingress-nginx metrics)
        - alert: RailPushAPIHigh5xxErrorRate
          expr: |
            (
              sum(increase(nginx_ingress_controller_requests{namespace="railpush",ingress=~"railpush-control-plane|railpush-control-plane-console",status=~"5.."}[5m]))
              /
              clamp_min(sum(increase(nginx_ingress_controller_requests{namespace="railpush",ingress=~"railpush-control-plane|railpush-control-plane-console"}[5m])), 1)
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            product: railpush
            component: api
          annotations:
            summary: "RailPush API 5xx error ratio is high (>5%)"
            description: "Ingress is reporting elevated 5xx responses for railpush control-plane over the last 5 minutes."

        - alert: RailPushAPI5xxBurst
          expr: |
            sum(increase(nginx_ingress_controller_requests{namespace="railpush",ingress=~"railpush-control-plane|railpush-control-plane-console",status=~"5.."}[5m])) > 25
          for: 5m
          labels:
            severity: critical
            product: railpush
            component: api
          annotations:
            summary: "RailPush API is serving a burst of 5xx responses"
            description: "More than 25 5xx responses were served by ingress for railpush control-plane over 5 minutes."

        # Deploy/build failures (Kubernetes build jobs)
        - alert: RailPushBuildJobFailures
          expr: |
            increase(kube_job_status_failed{namespace="railpush",job_name=~"rp-build-.*"}[15m]) > 0
          for: 2m
          labels:
            severity: warning
            product: railpush
            component: build
          annotations:
            summary: "RailPush build job failures detected"
            description: "One or more Kubernetes build jobs failed in the last 15 minutes."

        # Tenant backup health (CronJob + Jobs)
        - alert: RailPushTenantBackupStale
          expr: |
            (time() - kube_cronjob_status_last_successful_time{namespace="railpush",cronjob="railpush-tenant-backup"}) > 7200
          for: 15m
          labels:
            severity: warning
            product: railpush
            component: backup
          annotations:
            summary: "RailPush tenant backup is stale"
            description: "CronJob railpush/railpush-tenant-backup has not succeeded for over 2 hours."

        - alert: RailPushTenantBackupJobFailures
          expr: |
            increase(kube_job_status_failed{namespace="railpush",job_name=~"railpush-tenant-backup-.*"}[2h]) > 0
          for: 5m
          labels:
            severity: warning
            product: railpush
            component: backup
          annotations:
            summary: "RailPush tenant backup job failures detected"
            description: "One or more tenant backup jobs failed in the last 2 hours."

        # Longhorn volume robustness (data-loss precursors)
        - alert: LonghornVolumeDegraded
          expr: |
            max by (pvc_namespace, pvc, volume) (longhorn_volume_robustness{state="degraded"}) > 0
          for: 10m
          labels:
            severity: warning
            product: railpush
            component: longhorn
          annotations:
            summary: "Longhorn volume is degraded"
            description: "Longhorn volume {{ $labels.volume }} (PVC {{ $labels.pvc_namespace }}/{{ $labels.pvc }}) is degraded."

        - alert: LonghornVolumeFaulted
          expr: |
            max by (pvc_namespace, pvc, volume) (longhorn_volume_robustness{state="faulted"}) > 0
          for: 2m
          labels:
            severity: critical
            product: railpush
            component: longhorn
          annotations:
            summary: "Longhorn volume is faulted"
            description: "Longhorn volume {{ $labels.volume }} (PVC {{ $labels.pvc_namespace }}/{{ $labels.pvc }}) is faulted and at risk."
