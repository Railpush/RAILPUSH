apiVersion: v1
kind: ConfigMap
metadata:
  name: railpush-config
  namespace: railpush
data:
  CONTROL_PLANE_DOMAIN: "railpush.com"
  GITHUB_CALLBACK_URL: "https://railpush.com/api/v1/auth/github/callback"
  # Keep apps.railpush.com during cutover (optional). Remove later if you want only the apex.
  CORS_ALLOWED_ORIGINS: "https://railpush.com,https://www.railpush.com,https://apps.railpush.com,https://flightatom-client-tasks.apps.railpush.com"
