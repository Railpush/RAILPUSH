# ingress-nginx values for RailPush (k3s, self-hosted).
#
# Apply (from cpu):
#   export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
#   helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
#     -n ingress-nginx --create-namespace \
#     -f /opt/railpush/deploy/k8s/cluster/ingress-nginx-values.yaml
#
# Node prep (run once):
#   kubectl label node cpu  ingress-ready=true
#   kubectl label node xeon ingress-ready=true
#
# Firewall:
# - Ensure ingress nodes allow inbound 80/tcp + 443/tcp from the internet.
# - If scraping controller metrics via hostNetwork port 10254, allow 10254/tcp from other cluster nodes (or from Prometheus node(s)).

controller:
  kind: Deployment
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  replicaCount: 2

  # Real client IP support when the console is proxied behind Cloudflare.
  #
  # - Cloudflare sets: CF-Connecting-IP=<original client IP>
  # - We only trust that header when the direct peer is one of Cloudflare's
  #   published proxy IP ranges.
  #
  # This keeps direct-to-origin requests safe from header spoofing.
  config:
    use-forwarded-headers: "true"
    forwarded-for-header: "CF-Connecting-IP"
    # From https://www.cloudflare.com/ips (v4 + v6). Keep this list updated.
    proxy-real-ip-cidr: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"

  # With hostNetwork (:80/:443), we cannot surge extra pods during rolling updates
  # (port conflicts). This strategy keeps one controller up while replacing the other.
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  # Only schedule ingress on nodes we explicitly label.
  nodeSelector:
    ingress-ready: "true"
    kubernetes.io/os: linux

  # One ingress controller per node (hostNetwork binds :80/:443).
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/instance: ingress-nginx
              app.kubernetes.io/component: controller
          topologyKey: kubernetes.io/hostname

  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists

  # We bind directly to host :80/:443 with hostNetwork, so we don't need a Service.
  service:
    enabled: false

  # The patch job that updates ValidatingWebhookConfiguration should run on an ingress-ready node.
  admissionWebhooks:
    patch:
      nodeSelector:
        ingress-ready: "true"
        kubernetes.io/os: linux
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists

  ingressClassResource:
    name: nginx
    default: true

defaultBackend:
  enabled: false
